services:
  license-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Set these in your shell / CI instead of hardcoding secrets.
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-license_server}
      # If you don't use Mongo, comment the Mongo vars and use DATABASE_URL:
      # DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/licenses.db}

